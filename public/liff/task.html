<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>タスク管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f7fa;
  color: #1f2937;
  min-height: 100vh;
}
.container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px 32px;
}
header {
  text-align: center;
  padding: 20px 0 12px;
  font-size: 20px;
  font-weight: 700;
  color: #1f2937;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 24px 20px;
  margin-bottom: 16px;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: #6b7280;
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #6b7280;
  margin-bottom: 6px;
  margin-top: 18px;
}
label:first-child { margin-top: 0; }
input[type="date"],
input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e5e7eb;
  border-radius: 12px;
  font-size: 16px;
  color: #1f2937;
  background: #f9fafb;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus {
  border-color: #4f46e5;
  background: #fff;
}
.submit-btn {
  width: 100%;
  padding: 16px;
  margin-top: 24px;
  background: #4f46e5;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn:active { transform: scale(0.98); background: #4338ca; }
.submit-btn:disabled {
  background: #a5b4fc;
  cursor: not-allowed;
}

/* 優先度トグル */
.priority-group {
  display: flex;
  gap: 8px;
}
.priority-btn {
  flex: 1;
  padding: 10px 8px;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  background: #f9fafb;
  font-size: 14px;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  font-weight: 500;
}
.priority-btn:active { transform: scale(0.96); }
.priority-btn.active {
  background: #4f46e5;
  color: #fff;
  border-color: #4f46e5;
  font-weight: 600;
}

/* タスクリスト */
.task-list {
  list-style: none;
}
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid #f3f4f6;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.3s;
}
.task-item:last-child { border-bottom: none; }
.task-item:active { opacity: 0.6; }
.task-check {
  width: 24px;
  height: 24px;
  border: 2px solid #d1d5db;
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.task-item.completing .task-check {
  background: #4f46e5;
  border-color: #4f46e5;
}
.task-item.completing .task-check::after {
  content: '\2713';
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}
.task-item.completing .task-title {
  text-decoration: line-through;
  color: #9ca3af;
}
.task-info { flex: 1; min-width: 0; }
.task-title {
  font-size: 15px;
  font-weight: 500;
  color: #1f2937;
  transition: color 0.3s;
}
.task-meta {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 2px;
}
.task-priority {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
  flex-shrink: 0;
}
.task-priority.high { background: #fef2f2; color: #dc2626; }
.task-priority.medium { background: #fffbeb; color: #d97706; }
.task-priority.low { background: #f0fdf4; color: #16a34a; }

.empty-state {
  text-align: center;
  padding: 24px 0;
  color: #9ca3af;
  font-size: 14px;
}

/* トースト */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1f2937;
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ローディング */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.spinner {
  width: 40px; height: 40px;
  border: 4px solid #e5e7eb;
  border-top-color: #4f46e5;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>&#x2705; タスク</header>

  <!-- 未完了タスク一覧 -->
  <div class="card">
    <div class="section-title">&#x2500;&#x2500; 未完了タスク &#x2500;&#x2500;</div>
    <ul class="task-list" id="taskList">
      <li class="empty-state" id="taskLoading">読み込み中...</li>
    </ul>
  </div>

  <!-- 新規タスク追加 -->
  <div class="card">
    <div class="section-title">&#x2500;&#x2500; 新規タスク追加 &#x2500;&#x2500;</div>
    <form id="taskForm">
      <label>タイトル *</label>
      <input type="text" id="inputTitle" placeholder="タスクを入力" required />

      <label>期限（任意）</label>
      <input type="date" id="inputDue" />

      <label>優先度</label>
      <div class="priority-group">
        <button type="button" class="priority-btn" data-priority="low">低</button>
        <button type="button" class="priority-btn active" data-priority="medium">中</button>
        <button type="button" class="priority-btn" data-priority="high">高</button>
      </div>

      <button type="submit" class="submit-btn">追加する</button>
    </form>
  </div>
</div>

<script>
(function() {
  var selectedPriority = 'medium';
  var liffToken = '';

  // --- LIFF初期化 ---
  liff.init({ liffId: '2009645462-eNouqokE' }).then(function() {
    if (!liff.isLoggedIn()) { liff.login(); return; }
    try { liffToken = liff.getAccessToken(); } catch(ex) {}
    loadTasks();
  }).catch(function(err) {
    console.error('LIFF init error', err);
  });

  // --- 優先度選択 ---
  var priBtns = document.querySelectorAll('.priority-btn');
  priBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      priBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      selectedPriority = btn.getAttribute('data-priority');
    });
  });

  // --- タスク一覧取得 ---
  function loadTasks() {
    fetch('/api/liff?action=tasks&liffToken=' + encodeURIComponent(liffToken))
      .then(function(res) {
        if (res.status === 401) {
          document.getElementById('taskList').innerHTML = '<li class="empty-state">認証に失敗しました。LINEから再度開いてください。</li>';
          return null;
        }
        return res.json();
      })
      .then(function(data) {
        if (!data) return;
        renderTasks(data.data || []);
      })
      .catch(function() {
        document.getElementById('taskList').innerHTML = '<li class="empty-state">読み込みに失敗しました</li>';
      });
  }

  // --- タスク描画 ---
  function renderTasks(tasks) {
    var list = document.getElementById('taskList');
    var pending = tasks.filter(function(t) { return t.status !== 'done'; });
    if (pending.length === 0) {
      list.innerHTML = '<li class="empty-state">未完了タスクはありません</li>';
      return;
    }
    list.innerHTML = '';
    pending.forEach(function(task) {
      var li = document.createElement('li');
      li.className = 'task-item';
      li.setAttribute('data-id', task.id);

      var priClass = (task.priority === 'high') ? 'high' : (task.priority === 'low') ? 'low' : 'medium';
      var priLabel = (task.priority === 'high') ? '高' : (task.priority === 'low') ? '低' : '中';
      var dueTxt = task.due_date ? formatDate(task.due_date) : '';

      li.innerHTML =
        '<div class="task-check"></div>' +
        '<div class="task-info">' +
          '<div class="task-title">' + escHtml(task.title) + '</div>' +
          (dueTxt ? '<div class="task-meta">期限: ' + dueTxt + '</div>' : '') +
        '</div>' +
        '<span class="task-priority ' + priClass + '">' + priLabel + '</span>';

      li.addEventListener('click', function() { completeTask(task.id, li); });
      list.appendChild(li);
    });
  }

  // --- タスク完了 ---
  function completeTask(taskId, el) {
    el.classList.add('completing');
    setTimeout(function() {
      fetch('/api/liff?action=task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId: taskId, status: 'done', liffToken: liffToken }),
      })
      .then(function(res) {
        if (res.status === 401) {
          el.classList.remove('completing');
          showToast('認証に失敗しました。LINEから再度開いてください。');
          return null;
        }
        return res.json();
      })
      .then(function(result) {
        if (!result) return;
        if (result.status === 'ok') {
          showToast('タスクを完了しました');
          loadTasks();
        } else {
          el.classList.remove('completing');
          showToast('エラーが発生しました');
        }
      })
      .catch(function() {
        el.classList.remove('completing');
        showToast('通信エラー');
      });
    }, 400);
  }

  // --- 新規タスク追加 ---
  document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var title = document.getElementById('inputTitle').value.trim();
    if (!title) { showToast('タイトルを入力してください'); return; }

    var submitBtn = document.querySelector('.submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = '送信中...';

    var data = {
      title: title,
      priority: selectedPriority,
      due_date: document.getElementById('inputDue').value || null,
      liffToken: liffToken,
    };

    fetch('/api/liff?action=task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })
    .then(function(res) {
      if (res.status === 401) {
        submitBtn.disabled = false;
        submitBtn.textContent = '追加する';
        showToast('認証に失敗しました。LINEから再度開いてください。');
        return null;
      }
      return res.json();
    })
    .then(function(result) {
      if (!result) return;
      submitBtn.disabled = false;
      submitBtn.textContent = '追加する';
      if (result.status === 'ok') {
        showToast('タスクを追加しました');
        document.getElementById('inputTitle').value = '';
        document.getElementById('inputDue').value = '';
        loadTasks();

        // LIFFからトークに送信
        try {
          if (liff.isInClient()) {
            liff.sendMessages([{
              type: 'text',
              text: '\u2705 タスク追加: ' + title + (selectedPriority === 'high' ? ' [高]' : ''),
            }]);
          }
        } catch(ex) {}

        setTimeout(function() {
          try { if (liff.isInClient()) liff.closeWindow(); } catch(ex) {}
        }, 3000);
      } else {
        showToast('エラー: ' + (result.error || '追加に失敗しました'));
      }
    })
    .catch(function() {
      submitBtn.disabled = false;
      submitBtn.textContent = '再送信';
      showToast('通信エラーが発生しました。入力内容は保持されています。');
    });
  });

  // --- トースト ---
  function showToast(msg) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { t.classList.add('show'); });
    });
    setTimeout(function() {
      t.classList.remove('show');
      setTimeout(function() { t.remove(); }, 300);
    }, 2500);
  }

  // --- ユーティリティ ---
  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
